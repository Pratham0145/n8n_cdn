<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Chat</title>
    <style>
        :root {
            --chat-primary-color: #ff6d5a;
            --chat-secondary-color: #f0f0f0;
            --chat-text-color: #333;
            --chat-border-color: #ddd;
            --chat-bg-color: #fff;
            --chat-user-bg: #ff6d5a;
            --chat-bot-bg: #f8f8f8;
            --chat-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            --chat-border-radius: 8px;
            --chat-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--chat-font-family);
            background-color: #f5f5f5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .chat-container {
            width: 100vw;
            height: 100vh;
            background-color: var(--chat-bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-image: linear-gradient(to right, rgb(8, 49, 130), #5c006b);
            animation: BackgroundGradient 15s ease infinite;
            padding: 10px 12px;
            border-bottom: 1px solid var(--chat-border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 32px;
            height: 32px;
            background-color: var(--chat-primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .chat-header-text {
            flex: 1;
        }

        .chat-header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--chat-text-color);
            margin-bottom: 2px;
        }

        .chat-header-subtitle {
            font-size: 12px;
            color: #cdc6c6;
        }

        .connection-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #28a745;
            margin-left: auto;
            transition: background-color 0.3s;
        }

        .connection-status.disconnected {
            background-color: #dc3545;
        }

        .connection-status.connecting {
            background-color: #ffc107;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: var(--chat-bg-color);
            min-height: 0;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--chat-border-color);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        /* .message.bot .message-avatar {
            background-color: var(--chat-primary-color);
        } */

        /* .message.user .message-avatar {
            background-color: var(--chat-primary-color);
        } */

        .message-content {
            max-width: 100%;
            padding: 8px 12px;
            border-radius: var(--chat-border-radius);
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot .message-content {
            background-color: var(--chat-bot-bg);
            color: var(--chat-text-color);
        }

        .message.user .message-content {
            /* background-color: var(--chat-user-bg); */
            background: linear-gradient(to right, rgb(9, 90, 160), rgb(63, 11, 137));
            color: white;
        }

        /* Enhanced styles for table handling */
        .message-bubble-table {
            background-color: var(--chat-bot-bg);
            border: 1px solid var(--chat-border-color);
            border-radius: var(--chat-border-radius);
            padding: 12px;
            margin-bottom: 8px;
            overflow-x: auto;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid var(--chat-border-color);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 400px;
        }

        .data-table th,
        .data-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--chat-border-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .data-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: var(--chat-text-color);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .data-table tr:hover {
            background-color: #f8f9fa;
        }

        .table-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .table-actions button {
            padding: 6px 12px;
            border: 1px solid var(--chat-border-color);
            border-radius: 4px;
            background-color: white;
            color: var(--chat-text-color);
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .table-actions button:hover {
            background-color: var(--chat-primary-color);
            color: white;
            border-color: var(--chat-primary-color);
        }

        .table-actions button svg {
            width: 14px;
            height: 14px;
        }

        /* Modal styles for full table view */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            border-radius: var(--chat-border-radius);
            padding: 20px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--chat-border-color);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--chat-text-color);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--chat-primary-color);
        }

        .dropdown-container {
            margin-top: 12px;
            padding: 12px;
            background-color: #f8f9fa;
            border-radius: var(--chat-border-radius);
            border: 1px solid var(--chat-border-color);
        }

        .dropdown-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .dropdown-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--chat-border-color);
            border-radius: 4px;
            font-size: 14px;
            background-color: white;
            color: var(--chat-text-color);
        }

        .dropdown-select:focus {
            outline: none;
            border-color: var(--chat-primary-color);
        }

        .typing-indicator {
            display: none;
            margin-bottom: 16px;
            align-items: flex-start;
            gap: 8px;
            padding: 0px;
        }

        .typing-indicator.active {
            padding: 16px;
            display: flex;
        }

        .typing-dots {
            background-color: var(--chat-bot-bg);
            border: 1px solid var(--chat-border-color);
            border-radius: var(--chat-border-radius);
            padding: 8px 12px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        .chat-input-container {
            padding: 16px;
            background-color: var(--chat-bg-color);
            border-top: 1px solid var(--chat-border-color);
            flex-shrink: 0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #5c006b;
            border-radius: 10px;
            font-size: 14px;
            font-family: var(--chat-font-family);
            outline: none;
            resize: none;
            min-height: 36px;
            max-height: 120px;
            line-height: 1.4;
        }

        .chat-input:focus {
            border-color: #5c006b;
            border-radius: 10px;
        }

        .send-button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: var(--chat-border-radius);
            background-color: rgb(63, 11, 137);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }

        .send-button:hover:not(:disabled) {
            background-color: #e55a47;
        }

        .send-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .send-icon {
            width: 16px;
            height: 16px;
        }

        .initial-loading {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 16px 0;
        }

        .initial-loading .message {
            margin-bottom: 0;
        }

        .loading-dots {
            background-color: var(--chat-bot-bg);
            border: 1px solid var(--chat-border-color);
            border-radius: var(--chat-border-radius);
            padding: 12px 16px;
            display: flex;
            gap: 6px;
            align-items: center;
            min-width: 60px;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #999;
            animation: loadingBounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        @keyframes loadingBounce {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            30% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .timestamp {
            margin-right: 35px;
            margin-left: 35px;
            font-size: 10px;
            color: #666;
            margin-bottom: 2px;
        }
        .message-content {
            background-color: #f0f0f0;
            padding: 8px;
            border-radius: 8px;
        }
        .message.user {
            text-align: right;
        }
        .message-group {
            width: 100%;
            margin-bottom: 10px;
        }







        .timestamp {
    font-size: 10px;
    color: #666;
    margin-bottom: 2px;
}
.message-content {

    border-radius: 8px;
}

    text-align: right;
}
.message-group {
    width: 100%;
    margin-bottom: 10px;
}
.table-container {
    overflow-x: auto;
}
table {
    border-collapse: collapse;
    width: 100%;
}
th, td {
    border: 1px solid #ddd;
    padding: 8px;
}
th {
    background-color: #f0f0f0;
}



    </style>
</head>

                    messageDiv.style.alignSelf = 'flex-end'; // Align message to the right
                } else {
                    timestampDiv.style.textAlign = 'left';
                    messageGroup.style.flexDirection = 'row'; // Default for bot (left-aligned)
                    messageDiv.style.alignSelf = 'flex-start'; // Align message to the left
                }

                // Apply flexbox to message group
                messageGroup.style.display = 'flex';
                messageGroup.style.flexDirection = 'column'; // Default column layout
                messageGroup.style.alignItems = sender === 'user' ? 'flex-end' : 'flex-start';

                this.chatMessages.appendChild(messageGroup);
                this.scrollToBottom();
            }

            // Table creation function (unchanged)
            createTableFromJSON(data, isPopup = false) {
                const tableContainer = document.createElement("div");
                tableContainer.className = "table-container";
                if (!isPopup) tableContainer.style.cursor = "pointer";

                const table = document.createElement("table");
                table.border = "1";
                if (!isPopup) {
                    table.style.width = "100%";
                    table.style.boxSizing = "border-box";
                    table.style.borderCollapse = "collapse";
                    table.style.marginLeft = "0px";
                    table.style.marginTop = "10px"; // Space between text and table
                }

                // === Column truncation ===
                let columnsToRender;
                if (isPopup || data.columns.length <= 6) {
                    columnsToRender = data.columns;
                } else {
                    const firstCols = data.columns.slice(0, 2);
                    const lastCols = data.columns.slice(-2);
                    columnsToRender = [...firstCols, '...', ...lastCols];
                }

                // === Header ===
                const thead = document.createElement("thead");
                const headerRow = document.createElement("tr");
                columnsToRender.forEach(col => {
                    const th = document.createElement("th");
                    th.innerText = col;
                    if (!isPopup) {
                        th.style.padding = "8px";
                        th.style.backgroundColor = "#f0f0f0";
                        th.style.fontSize = "14px";
                        th.style.whiteSpace = "normal";
                        th.style.wordBreak = "break-word";
                    }
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);

                // === Row truncation ===
                let rowsToRender;
                if (isPopup || data.rows.length <= 3) {
                    rowsToRender = data.rows;
                } else {
                    const firstRows = data.rows.slice(0, 2);
                    const lastRow = data.rows[data.rows.length - 1];
                    rowsToRender = [...firstRows, '...', lastRow];
                }

                // === Body ===
                const tbody = document.createElement("tbody");

                rowsToRender.forEach(row => {
                    const tr = document.createElement("tr");

                    if (row === '...') {
                        // Create placeholder row with individual boxed cells
                        columnsToRender.forEach(col => {
                            const td = document.createElement("td");
                            td.innerText = '...';
                            td.className = 'ellipsis';
                            if (!isPopup) {
                                td.style.textAlign = 'center';
                                td.style.color = '#888';
                                td.style.fontStyle = 'italic';
                                td.style.padding = "8px";
                                td.style.fontSize = "14px";
                            }
                            tr.appendChild(td);
                        });
                    } else {
                        columnsToRender.forEach(col => {
                            const td = document.createElement("td");

                            if (col === '...') {
                                td.innerText = '...';
                                td.className = 'ellipsis';
                                if (!isPopup) {
                                    td.style.textAlign = 'center';
                                    td.style.color = '#888';
                                    td.style.fontStyle = 'italic';
                                    td.style.padding = "8px";
                                    td.style.fontSize = "14px";
                                    td.style.whiteSpace = "normal";
                                    td.style.wordBreak = "break-word";
                                }
                            } else {
                                td.innerText = row[col] || '';
                                if (!isPopup) {
                                    td.style.padding = "8px";
                                    td.style.fontSize = "14px";
                                    td.style.whiteSpace = "normal";
                                    td.style.wordBreak = "break-word";
                                }
                            }

                            tr.appendChild(td);
                        });
                    }

                    tbody.appendChild(tr);
                });

                table.appendChild(tbody);
                return table;
            }

            // Dropdown creation function (unchanged)
            createDropdownFromJSON(data) {
                const container = document.createElement('div');
                container.className = 'options-container';
                container.style.marginTop = '10px';

                // Check the number of options
                if (data.options.length < 6) {
                    if (data.label) {
                        const labelElement = document.createElement('div');
                        labelElement.textContent = data.label;
                        labelElement.style.fontWeight = 'bold';
                        labelElement.style.margin = '5px 5px 5px 20px';
                        labelElement.style.fontSize = '14px';
                        container.prepend(labelElement);
                        container.style = '';
                    }

                    container.style.marginBottom = '-11px';
                    container.style.display = 'flex';
                    container.style.gap = '15px';
                    container.style.flexWrap = 'wrap';
                    container.style.background = 'rgb(241 241 241 / 0%)';
                    container.style.padding = '5px 20px 8px 20px';
                    container.style.borderRadius = '0px 0px 12px 12px';

                    data.options.forEach(option => {
                        const button = document.createElement('button');
                        button.innerText = option;
                        button.style.padding = '8px 15px';
                        button.style.borderRadius = '20px';
                        button.style.border = '0px solid #103278';
                        button.style.backgroundColor = '#fff';
                        button.style.color = '#000';
                        button.style.cursor = 'pointer';
                        button.style.fontSize = '14px';
                        button.style.fontWeight = '500';
                        button.style.transition = 'background-color 0.3s, transform 0.2s';
                        button.style.boxShadow = '0 1px 2px rgba(0, 0, 0, 0.52)';

                        // Add hover effect
                        button.onmouseover = () => {
                            button.style.backgroundColor = 'rgb(9, 55, 148)';
                            button.style.color = '#fff';
                        };
                        button.onmouseout = () => {
                            button.style.backgroundColor = '#fff';
                            button.style.color = '#000';
                        };
                        container.appendChild(button);
                    });
                } else {
                    container.style.background = 'rgb(241 241 241 / 0%)';
                    container.style.padding = '5px 20px';

                    const select = document.createElement('select');
                    select.style.marginLeft = '0px';
                    select.style.width = '20%';
                    select.style.padding = '8px';
                    select.style.borderRadius = '12px';
                    select.style.border = '0.5px solid #103278';

                    // Add default option
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.text = '--- select ---';
                    defaultOption.disabled = true;
                    defaultOption.selected = true;
                    select.appendChild(defaultOption);

                    // Add options from data
                    data.options.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option;
                        opt.text = option;
                        select.appendChild(opt);
                    });

                    container.appendChild(select);
                }

                return container;
            }






            showTypingIndicator() {
                this.isTyping = true;
                this.typingIndicator.classList.add('active');
                this.handleInputChange();
                this.scrollToBottom();
            }

            hideTypingIndicator() {
                this.isTyping = false;
                this.typingIndicator.classList.remove('active');
                this.handleInputChange();
            }

            scrollToBottom() {
                setTimeout(() => {
                    this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
                }, 100);
            }

            // Public API methods
            setWebSocketUrl(url) {
                this.wsUrl = url;
                if (this.ws) {
                    this.ws.close();
                }
                this.connectWebSocket();
            }

            clearChat() {
                this.chatMessages.innerHTML = '';
                this.hideInitialLoading();
            }

            sendMessage(message) {
                this.chatInput.value = message;
                this.handleSend();
            }

            disconnect() {
                if (this.ws) {
                    this.ws.close();
                }
            }

            reconnect() {
                this.reconnectAttempts = 0;
                this.connectWebSocket();
            }

            // Method to handle different types of responses
            handleLegacyResponse(data) {
                // Handle legacy response format for backward compatibility
                switch (data.type) {
                    case 'message':
                    case 'response':
                        this.hideTypingIndicator();
                        this.addSimpleMessage(data.message || data.content || data.output || 'Thank you for your message!', 'bot');
                        break;
                    case 'typing':
                        if (data.isTyping) {
                            this.showTypingIndicator();
                        } else {
                            this.hideTypingIndicator();
                        }
                        break;
                    case 'error':
                        this.hideTypingIndicator();
                        this.addSimpleMessage('Sorry, an error occurred: ' + (data.message || 'Unknown error'), 'bot');
                        break;
                    case 'status':
                        console.log('Status update:', data.message);
                        break;
                    default:
                        // Handle any other message format
                        if (data.message || data.content || data.output) {
                            this.hideTypingIndicator();
                            this.addSimpleMessage(data.message || data.content || data.output, 'bot');
                        }
                }
            }
        }

            wsUrl: 'ws://10.0.13.74:8092?client_id=upc20011&workflow_id=b333245b-f6bf-4ca1-8154-9a2326ba8d55'
